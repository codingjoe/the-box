name: Release
on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
concurrency:
  group: release
  cancel-in-progress: false
jobs:
  containers:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        container:
          - caddy
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/the-box-${{ matrix.container }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: containers/${{ matrix.container }}
          file: containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}, ${{ vars.DOCKER_USERNAME }}/the-box-${{ matrix.container }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: index.docker.io/${{ vars.DOCKER_USERNAME }}/the-box-${{ matrix.container }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
  oci-artifacts-app:
    name: OCI artifact
    needs: [containers]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - postgres
          - redis
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: codingjoe/the-box/actions/compose@main
      - run: docker stack config --skip-interpolation -c containers/compose.web.yml -c containers/compose.${{ matrix.service }}.yml > compose.${{ matrix.service }}.compiled.yml
      - run: docker compose --file compose.${{ matrix.service }}.compiled.yml publish --yes ${{ github.actor }}/the-box-${{ matrix.service }}:${{ github.ref_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: compose.${{ matrix.service }}.yml
          path: compose.${{ matrix.service }}.compiled.yml
  oci-artifacts-box:
    name: OCI artifact
    needs: [containers]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: codingjoe/the-box/actions/compose@main
      - run: docker stack config --skip-interpolation -c containers/compose.yml > compose.compiled.yml
      - run: docker compose --file compose.compiled.yml publish --yes ${{ github.actor }}/the-box:${{ github.ref_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: compose.yml
          path: compose.compiled.yml
