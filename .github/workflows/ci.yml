name: CI
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  container:
    name: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        container:
          - caddy
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v6
        with:
          context: containers/${{ matrix.container }}
          file: containers/${{ matrix.container }}/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
  oci-artifacts:
    name: OCI artifact
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - ""
          - -postgres
          - -redis
    steps:
      - uses: actions/checkout@v6
      - uses: codingjoe/the-box/actions/compose@main
      - run: docker compose --file containers/compose${{ matrix.service }}.yml config --no-interpolate --no-path-resolution --no-env-resolution -o compose${{ matrix.service }}.compiled.yml
      - run: docker compose --file compose${{ matrix.service }}.compiled.yml publish --yes --dry-run ${{ github.actor }}/the-box${{ matrix.service }}:${{ github.ref_name }}
      - uses: actions/upload-artifact@v7
        with:
          name: compose.${{ matrix.service }}.yml
          path: compose.${{ matrix.service }}.compiled.yml
